<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Anime Card Game</title>
<style>
body { margin:0; background:linear-gradient(180deg,#0f172a,#020617); color:white; font-family:sans-serif; text-align:center; }
h1 { margin-top:20px; font-size:2.5em; text-shadow:0 0 20px #6366f1; }
button, select { padding:10px 15px; margin:10px; border:none; border-radius:10px; background:#6366f1; color:white; cursor:pointer; }
#pointsDisplay { margin-top:15px; }
.card { margin-top:20px; padding:15px; width:220px; border-radius:15px; display:inline-block; border:3px solid white; animation:fadeIn 0.5s ease; }
.card img { width:100%; border-radius:10px; }
.Common { border-color:gray; }
.Rare { border-color:#3b82f6; }
.Epic { border-color:#a855f7; }
.Legendary { border-color:gold; box-shadow:0 0 20px gold; }
@keyframes fadeIn { from{opacity:0;transform:scale(0.8);} to{opacity:1;transform:scale(1);} }
</style>
</head>
<body>

<h1>✦ InkVibe ✦</h1>

<select onchange="changeLang(this.value)">
  <option value="de">Deutsch</option>
  <option value="en">English</option>
  <option value="jp">日本語</option>
</select>

<p id="pointsDisplay">Ink: 0</p>

<button onclick="collectDailyInk()" id="dailyBtn">Tägliche Ink holen</button>
<button onclick="drawCard()" id="drawBtn">Karte ziehen (5 Ink)</button>
<button onclick="fight()" id="fightBtn">Kämpfen</button>

<div id="cardContainer"></div>

<h2 id="collectionTitle">Sammlung</h2>
<div id="collection"></div>

<script>
// --- Sprache ---
let lang = "de";
const text = {
  de:{draw:"Karte ziehen (5 Ink)",daily:"Tägliche Ink holen",fight:"Kämpfen",collection:"Sammlung",won:"Gewonnen!",lost:"Verloren!",notEnough:"Nicht genug Ink!",dailyGot:"Du hast 10 Ink bekommen!",dailyAlready:"Heute schon abgeholt!",legendary:"🔥 LEGENDARY!!! Bonus Ink!"},
  en:{draw:"Draw Card (5 Ink)",daily:"Collect Daily Ink",fight:"Fight",collection:"Collection",won:"You won!",lost:"You lost!",notEnough:"Not enough Ink!",dailyGot:"You received 10 Ink!",dailyAlready:"Already collected today!",legendary:"🔥 LEGENDARY!!! Bonus Ink!"},
  jp:{draw:"カードを引く（Ink 5）",daily:"毎日のInkを受け取る",fight:"戦う",collection:"コレクション",won:"勝利！",lost:"敗北！",notEnough:"Inkが足りません！",dailyGot:"10 Inkを獲得しました！",dailyAlready:"今日のInkはもう受け取り済みです！",legendary:"🔥 伝説カード！ボーナスInk!"}
};

function changeLang(l){
  lang = l;
  document.getElementById("drawBtn").innerText = text[lang].draw;
  document.getElementById("dailyBtn").innerText = text[lang].daily;
  document.getElementById("fightBtn").innerText = text[lang].fight;
  document.getElementById("collectionTitle").innerText = text[lang].collection;
  showCollection();
}

// --- Punkte & Sammlung ---
let points = Number(localStorage.getItem("points")) || 0;
let collection = JSON.parse(localStorage.getItem("cards")) || {};

// --- Karten 20 Stück ---
const cards = [
  {name:{de:"Feuerdrache",en:"Fire Dragon",jp:"火のドラゴン"},rarity:"Legendary",img:"1.png"},
  {name:{de:"Wassergeist",en:"Water Spirit",jp:"水の精霊"},rarity:"Epic",img:"2.png"},
  {name:{de:"Schattenwolf",en:"Shadow Wolf",jp:"影のオオカミ"},rarity:"Rare",img:"3.png"},
  {name:{de:"Lichtfee",en:"Light Fairy",jp:"光の妖精"},rarity:"Common",img:"4.png"},
  {name:{de:"Sturmluchs",en:"Storm Lynx",jp:"嵐の山猫"},rarity:"Epic",img:"5.png"},
  {name:{de:"Eisdrache",en:"Ice Dragon",jp:"氷のドラゴン"},rarity:"Legendary",img:"6.png"},
  {name:{de:"Nebelgeist",en:"Mist Spirit",jp:"霧の精霊"},rarity:"Rare",img:"7.png"},
  {name:{de:"Nachtfalke",en:"Night Falcon",jp:"夜の鷹"},rarity:"Epic",img:"8.png"},
  {name:{de:"Sonnenkrieger",en:"Sun Warrior",jp:"太陽の戦士"},rarity:"Rare",img:"9.png"},
  {name:{de:"Mondkatze",en:"Moon Cat",jp:"月の猫"},rarity:"Common",img:"10.png"},
  {name:{de:"Flammenfuchs",en:"Flame Fox",jp:"火の狐"},rarity:"Epic",img:"11.png"},
  {name:{de:"Wasserlilie",en:"Water Lily",jp:"水のユリ"},rarity:"Common",img:"12.png"},
  {name:{de:"Schattenpanther",en:"Shadow Panther",jp:"影の黒豹"},rarity:"Rare",img:"13.png"},
  {name:{de:"Lichterfee",en:"Glow Fairy",jp:"光の妖精"},rarity:"Epic",img:"14.png"},
  {name:{de:"Sturmsalamander",en:"Storm Salamander",jp:"嵐のサラマンダー"},rarity:"Rare",img:"15.png"},
  {name:{de:"Eisgeist",en:"Ice Spirit",jp:"氷の精霊"},rarity:"Epic",img:"16.png"},
  {name:{de:"Nebelwolf",en:"Mist Wolf",jp:"霧のオオカミ"},rarity:"Rare",img:"17.png"},
  {name:{de:"Nachtelfe",en:"Night Elf",jp:"夜の妖精"},rarity:"Legendary",img:"18.png"},
  {name:{de:"Sonnenlicht",en:"Sunlight",jp:"太陽の光"},rarity:"Common",img:"19.png"},
  {name:{de:"Mondgeist",en:"Moon Spirit",jp:"月の精霊"},rarity:"Rare",img:"20.png"}
];

// --- Gegner ---
const enemies = [
  {name:{de:"Goblin",en:"Goblin",jp:"ゴブリン"},strength:5},
  {name:{de:"Ork",en:"Orc",jp:"オーク"},strength:8},
  {name:{de:"Dämon",en:"Demon",jp:"悪魔"},strength:12},
  {name:{de:"Drache",en:"Dragon",jp:"ドラゴン"},strength:20}
];

// --- Funktionen ---
function getRandomCard(){
  const rand = Math.random();
  let rarity;
  if(rand<0.5) rarity="Common";
  else if(rand<0.8) rarity="Rare";
  else if(rand<0.95) rarity="Epic";
  else rarity="Legendary";
  const filtered = cards.filter(c=>c.rarity===rarity);
  return filtered[Math.floor(Math.random()*filtered.length)];
}

function collectDailyInk(){
  const today = new Date().toISOString().slice(0,10);
  const last = localStorage.getItem("lastDaily");
  if(last!==today){
    points+=10;
    localStorage.setItem("points",points);
    localStorage.setItem("lastDaily",today);
    updatePoints();
    alert(text[lang].dailyGot);
  } else alert(text[lang].dailyAlready);
}

function drawCard(){
  if(points<5){ alert(text[lang].notEnough); return; }
  points-=5;
  localStorage.setItem("points",points);
  const c=getRandomCard();
  const cname=c.name.de; // key für Sammlung
  if(collection[cname]) collection[cname].count++;
  else collection[cname]={...c,count:1};
  localStorage.setItem("cards",JSON.stringify(collection));
  if(c.rarity==="Legendary"){ points+=10; alert(text[lang].legendary); }
  updatePoints(); showCard(c); showCollection();
}

function fight(){
  const enemy=enemies[Math.floor(Math.random()*enemies.length)];
  const power=Object.values(collection).reduce((sum,c)=>sum+(c.count*(c.rarity=="Common"?1:c.rarity=="Rare"?3:c.rarity=="Epic"?5:8)),0);
  const result=power>=enemy.strength ? text[lang].won : text[lang].lost;
  alert(`${enemy.name[lang]} (Stärke: ${enemy.strength})\n${power} vs ${enemy.strength}\n${result}`);
  if(result===text[lang].won) points+=5;
  updatePoints();
}

// Anzeige
function updatePoints(){ document.getElementById("pointsDisplay").innerText="Ink: "+points; }
function showCard(c){ document.getElementById("cardContainer").innerHTML=`
  <div class="card ${c.rarity}"><h3>${c.name[lang]}</h3><img src="${c.img}"></div>`; }
function showCollection(){
  let html="";
  const total=Object.keys(collection).length;
  html+=`<p>${text[lang].collection}: ${total} / ${cards.length}</p><hr>`;
  Object.values(collection).forEach(c=>{
    html+=`<p>✧ ${c.name[lang]} (${c.rarity}) x${c.count}</p>`;
  });
  document.getElementById("collection").innerHTML=html;
}

// Start
updatePoints(); showCollection();
</script>
</body>
</html>
