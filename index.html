<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Anime Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">
<style>
body { margin:0; background: linear-gradient(180deg, #0f172a, #020617); color:white; font-family:'Orbitron','Noto Sans JP',sans-serif; text-align:center; }
h1 { margin-top:20px; font-size:2.5em; text-shadow:0 0 20px #6366f1; }
button, select { padding:10px 15px; margin:10px; border:none; border-radius:10px; background: rgba(99,102,241,0.2); color:white; backdrop-filter: blur(10px); cursor:pointer; transition:0.2s; }
button:hover { background:#6366f1; box-shadow:0 0 15px #6366f1; }
#pointsDisplay { font-size:18px; margin-top:15px; }
.card { margin-top:20px; padding:15px; width:220px; border-radius:15px; background: rgba(255,255,255,0.05); backdrop-filter:blur(15px); display:inline-block; animation:fadeIn 0.5s ease; border:3px solid transparent; }
.card img { width:100%; border-radius:10px; }
.card h3 { margin:10px 0; }
#collection p { opacity:0.8; font-size:14px; }
@keyframes fadeIn { from {opacity:0; transform: scale(0.8);} to {opacity:1; transform: scale(1);} }
.Common { border-color: gray; }
.Rare { border-color: #3b82f6; }
.Epic { border-color: #a855f7; }
.Legendary { border-color: gold; }
</style>
</head>
<body>

<h1>✦ InkVibe ✦</h1>

<select onchange="changeLang(this.value)">
  <option value="de">Deutsch</option>
  <option value="en">English</option>
  <option value="jp">日本語</option>
</select>

<p id="pointsDisplay">Ink: 0</p>
<button onclick="collectDailyInk()" id="dailyBtn">Tägliche Ink holen</button>
<button onclick="drawCard()" id="drawBtn">Karte ziehen (5 Ink)</button>

<div id="cardContainer"></div>
<h2>Collection</h2>
<div id="collection"></div>

<script>
// Sprache
let lang = "de";
const text = { de:{draw:"Karte ziehen (5 Ink)",daily:"Tägliche Ink holen"}, en:{draw:"Draw Card (5 Ink)",daily:"Collect Daily Ink"}, jp:{draw:"カードを引く（Ink 5）",daily:"毎日のInkを受け取る"} };
function changeLang(l){ lang=l; document.getElementById("drawBtn").innerText=text[lang].draw; document.getElementById("dailyBtn").innerText=text[lang].daily; showCollection(); }

// Punkte
let points = Number(localStorage.getItem("points")) || 0;
let collection = JSON.parse(localStorage.getItem("cards")) || [];

// Tägliche Ink
function collectDailyInk(){
  const today = new Date().toISOString().slice(0,10);
  const lastClaim = localStorage.getItem("lastDaily") || "";
  if(lastClaim !== today){
    points += 10;
    localStorage.setItem("points", points);
    localStorage.setItem("lastDaily", today);
    updatePoints();
    alert(lang=="de"?"Du hast 10 Ink erhalten!":"en"?"You received 10 Ink!":"10 Inkを獲得しました！");
  } else alert(lang=="de"?"Du hast heute schon Ink gesammelt!":"en"?"You already collected Ink today!":"今日のInkはもう受け取り済みです！");
}

// Karten
const cards = [
{name:{de:"Feuerdrache",en:"Fire Dragon",jp:"火のドラゴン"},rarity:"Legendary",img:"https://i.imgur.com/1AqVn7L.png"},
{name:{de:"Wassergeist",en:"Water Spirit",jp:"水の精霊"},rarity:"Epic",img:"https://i.imgur.com/A0jYfQ5.png"},
{name:{de:"Schattenwolf",en:"Shadow Wolf",jp:"影のオオカミ"},rarity:"Rare",img:"https://i.imgur.com/2L7cUOv.png"},
{name:{de:"Lichtfee",en:"Light Fairy",jp:"光の妖精"},rarity:"Common",img:"https://i.imgur.com/Bv5h3Z2.png"},
{name:{de:"Sturmluchs",en:"Storm Lynx",jp:"嵐の山猫"},rarity:"Epic",img:"https://i.imgur.com/C9i8pWs.png"},
{name:{de:"Eisdrache",en:"Ice Dragon",jp:"氷のドラゴン"},rarity:"Legendary",img:"https://i.imgur.com/Dz0rV0v.png"},
{name:{de:"Nebelgeist",en:"Mist Spirit",jp:"霧の精霊"},rarity:"Rare",img:"https://i.imgur.com/ER7cKuv.png"},
{name:{de:"Nachtfalke",en:"Night Falcon",jp:"夜の鷹"},rarity:"Epic",img:"https://i.imgur.com/Fk1hX8u.png"},
{name:{de:"Sonnenkrieger",en:"Sun Warrior",jp:"太陽の戦士"},rarity:"Rare",img:"https://i.imgur.com/Gh4vI9w.png"},
{name:{de:"Mondkatze",en:"Moon Cat",jp:"月の猫"},rarity:"Common",img:"https://i.imgur.com/H0jT2Pm.png"},
// ...restliche Karten analog hinzufügen
];

// Karte ziehen
function drawCard(){
  if(points >=5){
    points-=5;
    localStorage.setItem("points", points);
    updatePoints();
    const c = cards[Math.floor(Math.random()*cards.length)];
    collection.push(c);
    localStorage.setItem("cards", JSON.stringify(collection));
    showCard(c);
    showCollection();
  } else alert(lang=="de"?"Du brauchst mehr Ink!":"en"?"You need more Ink!":"カードを引くにはもっとInkが必要です！");
}

// Anzeige
function updatePoints(){ document.getElementById("pointsDisplay").innerText="Ink: "+points; }
function showCard(c){ document.getElementById("cardContainer").innerHTML=`<div class="card ${c.rarity}"><h3>${c.name[lang]}</h3><img src="${c.img}"></div>`; }
function showCollection(){ let html=""; collection.forEach(c=>html+=`<p>✧ ${c.name[lang]} (${c.rarity})</p>`); document.getElementById("collection").innerHTML=html; }

// Start
updatePoints();
showCollection();
</script>

</body>
</html>
