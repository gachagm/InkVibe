<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Anime Card Game</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color:white;
  font-family:sans-serif;
  text-align:center;
}

h1 {
  margin-top:20px;
  font-size:2.8em;
  text-shadow:0 0 25px #6366f1;
}

button, select {
  padding:10px 15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover {
  transform:scale(1.05);
  background:#818cf8;
}

#pointsDisplay {
  margin-top:15px;
  font-size:1.2em;
}

/* Karten */
.card {
  margin:10px;
  padding:10px;
  width:150px;
  border-radius:15px;
  display:inline-block;
  border:3px solid white;
  transition:0.3s;
  cursor:pointer;
}
.card:hover {
  transform:scale(1.1);
}

.selected {
  outline:4px solid #22c55e;
  transform:scale(1.15);
}

.Common { border-color:gray; }
.Rare { border-color:#3b82f6; }
.Epic { border-color:#a855f7; }
.Legendary {
  border-color:gold;
  box-shadow:0 0 20px gold;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* Anzeige */
#battleArea {
  margin-top:20px;
  padding:15px;
}
</style>
</head>

<body>

<h1>✦ InkVibe ✦</h1>

<p id="pointsDisplay">Ink: 0</p>

<button onclick="collectDailyInk()">Tägliche Ink</button>
<button onclick="drawCard()">Karte ziehen (5 Ink)</button>
<button onclick="fight()">Kämpfen</button>

<div id="battleArea"></div>

<h2>Sammlung (Klick = auswählen)</h2>
<div id="collection"></div>

<script>

// Punkte & Speicherung
let points = Number(localStorage.getItem("points")) || 0;
let collection = JSON.parse(localStorage.getItem("cards")) || {};
let selectedCard = null;

// Karten mit Stärke
const cards = [
  {name:"Feuerdrache",rarity:"Legendary",power:20,img:"1.png"},
  {name:"Wassergeist",rarity:"Epic",power:14,img:"2.png"},
  {name:"Schattenwolf",rarity:"Rare",power:10,img:"3.png"},
  {name:"Lichtfee",rarity:"Common",power:5,img:"4.png"},
  {name:"Eisdrache",rarity:"Legendary",power:22,img:"6.png"},
  {name:"Nachtelfe",rarity:"Legendary",power:18,img:"18.png"}
];

// Gegner
const enemies = [
  {name:"Goblin",strength:6},
  {name:"Ork",strength:10},
  {name:"Dämon",strength:15},
  {name:"Drache",strength:25}
];

// Zufallskarte
function getRandomCard(){
  return cards[Math.floor(Math.random()*cards.length)];
}

// Daily Ink
function collectDailyInk(){
  points += 10;
  save();
  alert("Du hast 10 Ink bekommen!");
}

// Karte ziehen
function drawCard(){
  if(points < 5){
    alert("Nicht genug Ink!");
    return;
  }

  points -= 5;
  const c = getRandomCard();

  if(collection[c.name]) collection[c.name].count++;
  else collection[c.name] = {...c, count:1};

  if(c.rarity==="Legendary"){
    points += 10;
    alert("🔥 LEGENDARY BONUS!");
  }

  save();
  showCollection();
}

// Karte auswählen
function selectCard(name){
  selectedCard = collection[name];
  showCollection();
}

// Kampf
function fight(){
  if(!selectedCard){
    alert("Wähle eine Karte!");
    return;
  }

  const enemy = enemies[Math.floor(Math.random()*enemies.length)];

  const result = selectedCard.power >= enemy.strength;

  let text = `
Gegner: ${enemy.name} (${enemy.strength})
Deine Karte: ${selectedCard.name} (${selectedCard.power})
`;

  if(result){
    points += 5;
    text += "\n🏆 Gewonnen!";
  } else {
    text += "\n💀 Verloren!";
  }

  alert(text);
  save();
}

// UI aktualisieren
function showCollection(){
  let html = "";

  Object.values(collection).forEach(c=>{
    html += `
    <div class="card ${c.rarity} ${selectedCard?.name===c.name?"selected":""}"
         onclick="selectCard('${c.name}')">
      <h4>${c.name}</h4>
      <img src="${c.img}">
      <p>${c.rarity}</p>
      <p>⚔️ ${c.power}</p>
      <p>x${c.count}</p>
    </div>`;
  });

  document.getElementById("collection").innerHTML = html;
}

// Speichern
function save(){
  localStorage.setItem("points", points);
  localStorage.setItem("cards", JSON.stringify(collection));
  updatePoints();
}

// Punkte anzeigen
function updatePoints(){
  document.getElementById("pointsDisplay").innerText = "Ink: " + points;
}

// Start
updatePoints();
showCollection();

</script>

</body>
</html>
