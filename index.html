<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>InkVibe - Anime Card Game</title>

<!-- Anime Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
  text-align: center;
}
h1 {
  margin-top: 20px;
  font-size: 2.5em;
  text-shadow: 0 0 20px #6366f1;
}
button, select {
  padding: 10px 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: rgba(99,102,241,0.2);
  color: white;
  backdrop-filter: blur(10px);
  cursor: pointer;
  transition: 0.2s;
}
button:hover {
  background: #6366f1;
  box-shadow: 0 0 15px #6366f1;
}
#pointsDisplay {
  font-size: 18px;
  margin-top: 15px;
}
.card {
  margin-top: 20px;
  padding: 15px;
  width: 220px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 0 25px rgba(99,102,241,0.5);
  display: inline-block;
  animation: fadeIn 0.5s ease;
}
.card img {
  width: 100%;
  border-radius: 10px;
}
.card h3 {
  margin: 10px 0;
}
#collection p {
  opacity: 0.8;
  font-size: 14px;
}
@keyframes fadeIn {
  from {opacity:0; transform: scale(0.8);}
  to {opacity:1; transform: scale(1);}
}
</style>
</head>
<body>

<h1>✦ InkVibe ✦</h1>

<select onchange="changeLang(this.value)">
  <option value="de">Deutsch</option>
  <option value="en">English</option>
  <option value="jp">日本語</option>
</select>

<br>

<p id="pointsDisplay">Ink: 0</p>
<button onclick="collectDailyInk()" id="dailyBtn">Tägliche Ink holen</button>
<button onclick="drawCard()" id="drawBtn">Karte ziehen (5 Ink)</button>

<div id="cardContainer"></div>

<h2>Collection</h2>
<div id="collection"></div>

<script>
// 🌍 Sprache
let lang = "de";
const text = {
  de: { draw: "Karte ziehen (5 Ink)", daily: "Tägliche Ink holen" },
  en: { draw: "Draw Card (5 Ink)", daily: "Collect Daily Ink" },
  jp: { draw: "カードを引く（Ink 5）", daily: "毎日のInkを受け取る" }
};

// 🔹 Sprache wechseln
function changeLang(l) {
  lang = l;
  document.getElementById("drawBtn").innerText = text[lang].draw;
  document.getElementById("dailyBtn").innerText = text[lang].daily;
  showCollection();
}

// 🃏 30 Karten
const cards = [];
for(let i=1;i<=30;i++){
  cards.push({
    name: {de:"Karte "+i, en:"Card "+i, jp:"カード "+i},
    img: "https://picsum.photos/200?random="+i
  });
}

// 💾 Speicher
let collection = JSON.parse(localStorage.getItem("cards")) || [];
let points = Number(localStorage.getItem("points")) || 0;

// 🔹 Punkte anzeigen
function updatePoints(){ document.getElementById("pointsDisplay").innerText = "Ink: " + points; }

// 🔹 Tägliche Ink (10 pro Tag)
function collectDailyInk(){
  const today = new Date().toISOString().slice(0,10); // yyyy-mm-dd
  const lastClaim = localStorage.getItem("lastDaily") || "";
  if(lastClaim !== today){
    points += 10;
    localStorage.setItem("points", points);
    localStorage.setItem("lastDaily", today);
    updatePoints();
    alert(lang=="de"?"Du hast 10 Ink erhalten!":"en"?"You received 10 Ink!":"10 Inkを獲得しました！");
  } else {
    alert(lang=="de"?"Du hast heute schon Ink gesammelt!":"en"?"You already collected Ink today!":"今日のInkはもう受け取り済みです！");
  }
}

// 🔹 Karte ziehen (5 Ink)
function drawCard(){
  if(points >=5){
    points -=5;
    localStorage.setItem("points", points);
    updatePoints();
    const c = cards[Math.floor(Math.random()*cards.length)];
    collection.push(c);
    localStorage.setItem("cards", JSON.stringify(collection));
    showCard(c);
    showCollection();
  } else{
    alert(lang=="de"?"Du brauchst mehr Ink, um eine Karte zu ziehen!":"en"?"You need more Ink to draw a card!":"カードを引くにはもっとInkが必要です！");
  }
}

// 🔹 Karte anzeigen
function showCard(c){
  document.getElementById("cardContainer").innerHTML = `
    <div class="card">
      <h3>${c.name[lang]}</h3>
      <img src="${c.img}">
    </div>
  `;
}

// 🔹 Sammlung
function showCollection(){
  let html="";
  collection.forEach(c=>html+=`<p>✧ ${c.name[lang]}</p>`);
  document.getElementById("collection").innerHTML = html;
}

// 🔹 Start
updatePoints();
showCollection();
</script>

</body>
</html>
