<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body{
  background:#020617;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.box{
  margin-top:100px;
  padding:30px;
  background:#0f172a;
  display:inline-block;
  border-radius:15px;
}

input{
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#6366f1;
  color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>Schul Login</h2>

<input id="mail" placeholder="name@mg.nuernberg.de"><br>
<button onclick="login()">Login</button>
</div>

<script>

function login(){
  let mail=document.getElementById("mail").value;

  if(!mail.includes("@mg.nuernberg.de")){
    alert("Nur Schul-Mail!");
    return;
  }

  localStorage.setItem("loggedIn","true");

  // Bonus einmal
  if(!localStorage.getItem("loginBonus")){
    let p=Number(localStorage.getItem("points"))||0;
    p+=30;
    localStorage.setItem("points",p);
    localStorage.setItem("loginBonus","true");
  }

  alert("Erfolgreich!");
  window.location.href="index.html";
}

</script>

</body>
</html>
